      </ul>
    </details>
  </header>

  <main>
    <section class="contact-page">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6 contact-page__container">
            <h2 class="contact-page__title">Get in Touch</h2>
            <p>Have a project in mind or just want to say hi? Fill out the form below!</p>

            <form class="contact-page__form" action="#" method="POST">
              <div class="contact-page__group mb-3">
                <label for="name" class="form-label">Name</label>
                <input class="contact-page__input form-control" type="text" id="name" name="name" placeholder="Your name" required />
              </div>
              <div class="contact-page__group mb-3">
                <label for="email" class="form-label">Email</label>
                <input class="contact-page__input form-control" type="email" id="email" name="email" placeholder="your@email.com" required />
              </div>
              <div class="contact-page__group mb-4">
                <label for="message" class="form-label">Message</label>
                <textarea class="contact-page__input form-control" id="message" name="message" placeholder="Write your message here..." required></textarea>
              </div>
              <div class="d-grid gap-2">
                <button class="contact-page__send btn" type="submit">
                  <i class="bi bi-send-fill"></i> Send Message
                </button>
                <a href="index.html" class="contact-page__back btn">
                  <i class="bi bi-arrow-left"></i> Back
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
